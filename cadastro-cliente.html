<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B7Store - Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans flex min-h-screen items-center justify-center p-6">

    <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-sm border border-slate-100">
        <div class="mb-8 text-center">
            <a href="index.html" class="text-3xl font-bold tracking-tight text-slate-900">B7<span class="text-blue-600">Store</span></a>
            <p class="mt-2 text-sm text-slate-500">Crie sua conta e comece a comprar</p>
        </div>

        <!-- Mensagens -->
        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl text-sm mb-4"></div>
        <div id="success-message" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl text-sm mb-4"></div>

        <!-- Formulário de Cadastro -->
        <form id="cadastro-form" class="space-y-5">
            <div>
                <label for="nome" class="block text-sm font-medium text-slate-700">Nome completo *</label>
                <input type="text" id="nome" name="nome" required 
                    placeholder="Digite seu nome completo"
                    class="mt-1 w-full rounded-2xl border border-slate-200 bg-slate-50 p-3.5 text-sm outline-none transition focus:border-slate-400 focus:bg-white">
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700">E-mail *</label>
                <input type="email" id="email" name="email" required 
                    placeholder="seu@email.com"
                    class="mt-1 w-full rounded-2xl border border-slate-200 bg-slate-50 p-3.5 text-sm outline-none transition focus:border-slate-400 focus:bg-white">
            </div>
            
            <div>
                <label for="telefone" class="block text-sm font-medium text-slate-700">Telefone <span class="text-slate-400 text-xs">(opcional)</span></label>
                <input type="tel" id="telefone" name="telefone" 
                    placeholder="(11) 99999-9999"
                    class="mt-1 w-full rounded-2xl border border-slate-200 bg-slate-50 p-3.5 text-sm outline-none transition focus:border-slate-400 focus:bg-white">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700">Senha *</label>
                <input type="password" id="password" name="password" required minlength="6" 
                    placeholder="Mínimo 6 caracteres"
                    class="mt-1 w-full rounded-2xl border border-slate-200 bg-slate-50 p-3.5 text-sm outline-none transition focus:border-slate-400 focus:bg-white">
                <p class="text-xs text-slate-400 mt-1">A senha deve ter no mínimo 6 caracteres</p>
            </div>
            
            <div>
                <label for="confirm-password" class="block text-sm font-medium text-slate-700">Confirmar senha *</label>
                <input type="password" id="confirm-password" name="confirm-password" required 
                    placeholder="Digite a senha novamente"
                    class="mt-1 w-full rounded-2xl border border-slate-200 bg-slate-50 p-3.5 text-sm outline-none transition focus:border-slate-400 focus:bg-white">
            </div>

            <div class="flex items-start gap-2">
                <input type="checkbox" id="termos" required class="mt-1">
                <label for="termos" class="text-xs text-slate-500">
                    Li e aceito os <a href="#" class="text-blue-600 hover:underline">Termos de Uso</a> e a 
                    <a href="#" class="text-blue-600 hover:underline">Política de Privacidade</a>
                </label>
            </div>

            <button type="submit" id="btn-cadastrar" 
                class="w-full rounded-2xl bg-blue-600 p-4 text-sm font-semibold text-white transition hover:bg-blue-700">
                <i class="fas fa-user-plus mr-2"></i>Criar minha conta
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500">
                Já tem uma conta? 
                <a href="login.html" class="text-blue-600 font-semibold hover:underline">Fazer login</a>
            </p>
        </div>
        
        <div class="mt-4 text-center">
            <a href="index.html" class="text-xs text-slate-400 hover:underline">← Voltar para a loja</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://back-loja.vercel.app";

        // Elementos
        const form = document.getElementById('cadastro-form');
        const btnCadastrar = document.getElementById('btn-cadastrar');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');

        function mostrarMensagem(msg, tipo) {
            if (tipo === 'error') {
                errorDiv.innerHTML = msg;
                errorDiv.classList.remove('hidden');
                successDiv.classList.add('hidden');
            } else {
                successDiv.innerHTML = msg;
                successDiv.classList.remove('hidden');
                errorDiv.classList.add('hidden');
            }
            
            // Esconder após 5 segundos
            setTimeout(() => {
                errorDiv.classList.add('hidden');
                successDiv.classList.add('hidden');
            }, 5000);
        }

        function limparMensagens() {
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
        }

        // Máscara para telefone
        document.getElementById('telefone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length <= 10) {
                value = value.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            } else {
                value = value.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            }
            e.target.value = value;
        });

        // Envio do formulário
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            limparMensagens();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const termos = document.getElementById('termos').checked;
            
            // Validações
            if (!nome) {
                mostrarMensagem('Por favor, digite seu nome completo.', 'error');
                document.getElementById('nome').focus();
                return;
            }
            
            if (!email || !email.includes('@')) {
                mostrarMensagem('Por favor, digite um e-mail válido.', 'error');
                document.getElementById('email').focus();
                return;
            }
            
            if (password.length < 6) {
                mostrarMensagem('A senha deve ter no mínimo 6 caracteres.', 'error');
                document.getElementById('password').focus();
                return;
            }
            
            if (password !== confirmPassword) {
                mostrarMensagem('As senhas não coincidem.', 'error');
                document.getElementById('confirm-password').focus();
                return;
            }
            
            if (!termos) {
                mostrarMensagem('Você precisa aceitar os Termos de Uso para continuar.', 'error');
                return;
            }
            
            // Desabilitar botão e mostrar loading
            btnCadastrar.disabled = true;
            btnCadastrar.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Criando conta...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        name: nome, 
                        email: email, 
                        password: password,
                        telefone: telefone || null
                    })
                });
                
                const data = await response.json();
                console.log('Resposta do servidor:', data);
                
                if (!response.ok) {
                    // Tratar erro de rate limit
                    if (response.status === 429) {
                        throw new Error('Muitas tentativas. Aguarde 1 minuto e tente novamente.');
                    }
                    throw new Error(data.mensagem || data.message || 'Erro ao criar conta');
                }
                
                if (data.sucesso === false) {
                    throw new Error(data.mensagem || 'Erro ao criar conta');
                }
                
                // Sucesso!
                mostrarMensagem('✅ Conta criada com sucesso! Redirecionando para o login...', 'success');
                
                // Limpar formulário
                form.reset();
                
                // Redirecionar para login após 2 segundos
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                console.error('Erro no cadastro:', error);
                mostrarMensagem(error.message || 'Erro ao criar conta. Tente novamente.', 'error');
            } finally {
                btnCadastrar.disabled = false;
                btnCadastrar.innerHTML = '<i class="fas fa-user-plus mr-2"></i>Criar minha conta';
            }
        });
        
        // Verificar se já está logado
        const token = localStorage.getItem('b7store_token');
        if (token) {
            fetch(`${API_BASE_URL}/api/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => {
                if (res.ok) {
                    window.location.href = 'index.html';
                }
            }).catch(() => {});
        }
    </script>
</body>
</html>
