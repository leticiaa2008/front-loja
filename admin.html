<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - B7Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-gray-800">B7<span class="text-blue-600">Store</span></a>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-gray-600"></span>
                <button onclick="logout()" class="text-red-600 hover:text-red-800">
                    <i class="fas fa-sign-out-alt text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold">Painel Administrativo</h1>
            <p class="text-gray-600">Gerencie os produtos da loja</p>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="md:col-span-1">
                <div class="bg-white rounded-lg shadow p-6 sticky top-4">
                    <h2 class="text-xl font-bold mb-4" id="formTitle">Cadastrar Produto</h2>
                    
                    <div id="formMessage" class="hidden p-3 rounded mb-4 text-sm"></div>
                    
                    <form id="productForm">
                        <input type="hidden" id="productId">
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2">Nome do Produto *</label>
                            <input type="text" id="productName" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2">Descrição</label>
                            <textarea id="productDescription" rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2">Preço (R$) *</label>
                            <input type="number" step="0.01" id="productPrice" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2">Preço Original (R$)</label>
                            <input type="number" step="0.01" id="productOriginalPrice" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2">Estoque</label>
                            <input type="number" id="productStock" value="10" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2">Imagem URL</label>
                            <input type="url" id="productImage" placeholder="https://..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <p class="text-xs text-gray-500 mt-1">Deixe em branco para usar imagem padrão</p>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2">Categoria</label>
                            <select id="productCategory" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="Camisetas">Camisetas</option>
                                <option value="Kits">Kits B7Web</option>
                                <option value="Acessórios">Acessórios</option>
                                <option value="Eletrônicos">Eletrônicos</option>
                            </select>
                        </div>
                        
                        <div class="flex gap-2">
                            <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
                                <i class="fas fa-save mr-2"></i>Salvar
                            </button>
                            <button type="button" onclick="resetForm()" class="px-4 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Products List Section -->
            <div class="md:col-span-2">
                <div class="bg-white rounded-lg shadow">
                    <div class="p-4 border-b flex justify-between items-center">
                        <h2 class="text-xl font-bold">Produtos Cadastrados</h2>
                        <div class="flex gap-2">
                            <input type="text" id="searchProduct" placeholder="Buscar produto..." class="px-3 py-1 border rounded-lg text-sm">
                        </div>
                    </div>
                    <div id="productsList" class="divide-y">
                        <div class="p
